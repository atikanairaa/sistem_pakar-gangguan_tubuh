<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pakar Postur Tubuh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        a{
            color: #4B3621;
            text-align: end;
        }
        a:hover{
            color: #93806c;
        }
        .navbar {
            font-size: 18px;
            color: #4B3621; 
        }
        .navbar-toggler-icon {
            background-color: #4B3621;
        }
        .navbar-nav .nav-link {
            color: #4B3621;
        }
        .navbar-nav .nav-link:hover {
            color: #4B3621;
        }
        .navbar-nav .nav-link.active {
            color: #F9F0E1; 
            background-color: #8E6A3D;
            border-radius: 5px;
        }
        body, html {
            height: 100%;
            background-color: #F0E1D2;
            color: #4B3621;
        }
        .content-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            flex: 1;
        }
        /* Styling untuk navbar dan footer */
        .navbar, footer {
            background-color: #D4B79D; 
        }
        /* Styling untuk menu navigasi */
        .nav-item .nav-link {
            color: #4B3621; 
        }
        .nav-item .nav-link:hover {
            color: #8E6A3D; 
        }
        .card {
            background-color: #F9F0E1; 
            border: 1px solid #D4B79D; 
            margin-bottom: 20px; 
        }
        .card-title {
            color: #4B3621; 
            margin-bottom: 12px;
        }
        .card-text {
            text-align: justify; 
            margin-left: 5px;
            margin-right: 10px;
        }
        .btn {
            background-color: #4B3621;
            color: #F9F0E1; 
            padding: 10px 20px;
        }
        .btn:hover {
            background-color: #8E6A3D; 
        }
        footer {
            text-align: center;
            color: #4B3621;
        }
    </style>
</head>
<body class="d-flex flex-column">
    <div class="content-wrapper">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark py-3">
            <div class="container justify-content-center">
                <ul class="navbar-nav flex-row">
                    <li class="nav-item mx-4">
                        <a class="nav-link{% if request.path == '/' %} active{% endif %}" href="/">Beranda</a>
                    </li>
                    <li class="nav-item mx-4">
                        <a class="nav-link{% if request.path == '/diagnosa' %} active{% endif %}" href="/diagnosa">Diagnosa</a>
                    </li>
                    <li class="nav-item mx-3">
                        <a class="nav-link{% if request.path == '/pencegahan' %} active{% endif %}" href="/pencegahan">Rekomendasi</a>
                    </li>
                </ul>
            </div>
        </nav>
        
        <!-- Content -->
        {% block content %}{% endblock %}

        <!-- Footer -->
        <footer class="text-dark py-3 mt-4">
            &copy; 2025 Atika Naira | Sistem Pakar Gangguan Postur Tubuh
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
